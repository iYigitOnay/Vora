services:
  vora-db:
    image: postgres:16-alpine
    container_name: vora-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-vorauser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vorapass123}
      POSTGRES_DB: ${DB_NAME:-voradb}
    ports:
      - "5432:5432"
    volumes:
      - vora_db_data:/var/lib/postgresql/data

  vora-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vora-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vorauser}:${DB_PASSWORD:-vorapass123}@vora-db:5432/${DB_NAME:-voradb}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-vora-key-2026}
    depends_on:
      - vora-db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  vora_db_data:
